<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavana Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Kavana Inventory</h1>
        <p>Control de inventario y costos</p>

        <input type="text" placeholder="Nombre del producto">
        <input type="number" placeholder="Cantidad">
        <input type="number" placeholder="Costo">

        <button>Agregar Producto</button>

        <h2>Inventario</h2>

        <ul>
            <li>Kratom Mix - 10 unidades</li>
            <li>Kava - 5 unidades</li>
            <li>Red Bull - 24 unidades</li>
        </ul>
    </div>

</body>
</html>
